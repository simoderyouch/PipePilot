# Default PipePilot configuration.
# This file is sourced by the Bash script before environment-specific settings.
# Values can still be overridden by command-line options.

# Default environment used when `-e` is not provided.
DEFAULT_ENV="staging"

# Default Git branch used when `-b` is not provided.
DEFAULT_BRANCH="main"

# Local directories used for generated logs and deployment archives.
DEFAULT_LOG_DIR="logs"
DEFAULT_ARCHIVE_DIR="archives"

# Default deployment target for local staging demonstrations.
DEFAULT_TARGET="deployments/staging"

# Default SSH deployment values. Remote mode is enabled with --remote; these
# defaults keep optional values predictable while required values stay explicit.
DEFAULT_SSH_PORT=22
DEFAULT_TRANSFER_TOOL="rsync"

# Fresh-server setup defaults. `--setup-server` enables provisioning and these
# values decide how much PipePilot should infer automatically.
DEFAULT_APP_KIND="auto"
DEFAULT_BACKEND_RUNTIME="auto"
DEFAULT_PACKAGE_MANAGER="auto"

# Smoke-test defaults; they are intentionally conservative for local demos.
DEFAULT_RETRIES=3
DEFAULT_TIMEOUT=5
DEFAULT_HEALTH_PATH="/"

# Compression used by the archive stage: gzip, xz, or zip.
DEFAULT_COMPRESSION="gzip"

# Number of archives to keep when cleanup is enabled.
DEFAULT_KEEP_ARCHIVES=5
